name: Build downgr8 IPK (Self-Contained)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi build-essential

    - name: Install webOS CLI
      run: npm install -g @webosose/ares-cli

    - name: Bundle Node Modules (The Fix)
      run: |
        # Go into the service source folder
        # Adjust path if your service files are in a different subdir
        cd build/service
        npm init -y
        npm install webos-service
        cd ../..

    - name: Patch C Source
      run: |
        # Fix the static_assert issue for the cross-compiler
        sed -i 's/static_assert/\/\/static_assert/' main.c

    - name: Compile Static Binary
      run: |
        # We use -static to bundle glibc so the TV can't complain
        make CC="arm-linux-gnueabi-gcc -static" LIBS=""

    - name: Package IPK
      run: ares-package build/app build/service

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: downgr8-ipk
        path: "*.ipk"
