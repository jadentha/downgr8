name: Build downgr8 IPK (Self-Contained)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi build-essential

    - name: Install webOS CLI
      run: npm install -g @webosose/ares-cli

    - name: Patch & Compile Static Binary
      run: |
        # Fix the static_assert and compile. 
        # This creates the 'build/app' and 'build/service' folders.
        sed -i 's/static_assert/\/\/static_assert/' main.c
        make CC="arm-linux-gnueabi-gcc -static" LIBS=""

    - name: Bundle Node Modules (The Fix)
      run: |
        # Now that 'make' has created the folders, we go in and install the libs
        cd build/service
        npm init -y
        npm install webos-service
        cd ../..

    - name: Package IPK
      run: ares-package build/app build/service

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: downgr8-ipk
        path: "*.ipk"
