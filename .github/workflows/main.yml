name: Build downgr8 IPK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install webOS CLI & ARM Cross-Compiler
      run: |
        sudo apt-get update
        # Install the standard Linux ARM compiler
        sudo apt-get install -y gcc-arm-linux-gnueabi
        # Install the webOS packaging tool
        npm install -g @webosose/ares-cli

    - name: Patch C Source Code
      run: |
        # Violently remove the static_assert that breaks older GCC versions
        sed -i 's/static_assert/\/\/static_assert/' main.c

    - name: Compile and Package
      run: |
        # Override the CC variable, and forcefully empty the LIBS variable so the linker doesn't panic
        make CC=arm-linux-gnueabi-gcc LIBS=""

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: downgr8-ipk
        # Grab the packaged file
        path: "*.ipk"
