name: Build downgr8 IPK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Downgrade to an older Ubuntu to get a more compatible GLIBC version
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install webOS CLI & ARM Cross-Compiler
      run: |
        sudo apt-get update
        # Install the older, more compatible ARM compiler
        sudo apt-get install -y gcc-arm-linux-gnueabi
        npm install -g @webosose/ares-cli

    - name: Patch C Source Code
      run: |
        # Nuke the static_assert that breaks older GCC
        sed -i 's/static_assert/\/\/static_assert/' main.c

    - name: Compile and Package
      run: |
        # Override CC and empty LIBS to bypass missing LG SDK files
        make CC=arm-linux-gnueabi-gcc LIBS=""
        # Manually package because the Makefile might expect specific paths
        ares-package build/app build/service

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: downgr8-ipk
        path: "*.ipk"
