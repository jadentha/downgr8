name: Build downgr8 IPK (Static)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi build-essential
        npm install -g @webosose/ares-cli

    - name: Compile and Package
      run: |
        # Fix the static_assert issue for the cross-compiler
        sed -i 's/static_assert/\/\/static_assert/' main.c
        # Compile as a static tank, ignoring the TV's GLIBC
        make CC="arm-linux-gnueabi-gcc -static" LIBS=""
        # Package the raw files
        ares-package build/app build/service

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: downgr8-ipk
        path: "*.ipk"
